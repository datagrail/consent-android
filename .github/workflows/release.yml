name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep -oP 'coordinates\("io\.datagrail",\s*"consent",\s*"\K[^"]+' library/build.gradle.kts)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.tag_check.outputs.exists == 'false'
        run: chmod +x gradlew

      - name: Run tests
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew :library:test

      - name: Build release AAR
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew :library:assembleRelease

      - name: Create git tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes \
            library/build/outputs/aar/*-release.aar

      - name: Publish to Maven Central
        if: steps.tag_check.outputs.exists == 'false'
        run: ./gradlew :library:publishAndReleaseToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
